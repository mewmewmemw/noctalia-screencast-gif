name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run lint
        run: ./tests/lint.sh

  # Note: the bats test suite drives a real wf-recorder + slurp + wl-copy
  # pipeline and therefore needs a live wlroots Wayland session. That's
  # impractical in CI without a nested compositor + xvfb-style harness, so
  # the suite is run locally only. See tests/README.md.
